# Scenario generation (experiment 00) — hyperparameters only, no infra paths.

# Taxonomy to triage. Repo-relative; the 171-emotion clusters live with exp 01.
# Swap to clusters_50.json to triage only the 50-emotion ground-truth set.
clusters_file: experiments/01-emotion-vectors/clusters.json

# --- stage 1: per-emotion candidate triage (done; Opus 4.8) ---
triage:
  scenarios_per_emotion: 4
  provider: openrouter            # hf | openrouter (key read from .env)
  model: anthropic/claude-opus-4.8
  temperature: 0.7
  max_tokens: 3000
  concurrency: 8

# --- stage 2a: emotion selection (free, deterministic) ---
# Target 600 examples = 480 train (24 emotions x 20) + 120 eval.
# peaceful_contentment is held out whole (regional-generalization eval);
# the existential-flagged relational scenarios are the topic-OOD eval.
selection:
  held_out_cluster: peaceful_contentment
  examples_per_emotion: 20            # per trained emotion (train split)
  eval_per_emotion: 6                 # per held-out-cluster emotion
  holdout_scenario_per_emotion: 2     # reserved-route eval, per trained emotion
  existential_eval: 30                # total existential-probe eval messages
  # 24 trained emotions across the other 9 clusters (balanced, mild skew to rich):
  train_per_cluster:
    exuberant_joy: 3
    compassionate_gratitude: 3
    competitive_pride: 2
    playful_amusement: 2
    depleted_disengagement: 1
    vigilant_suspicion: 2
    hostile_anger: 3
    fear_and_overwhelm: 4
    despair_and_shame: 4
  # pin specific emotions where the representative-ranking isn't ideal:
  train_overrides:
    fear_and_overwhelm: [afraid, anxious, worried, overwhelmed]

# --- stage 2b: user-message generation ---
# Opus after all: this is the actual training data, where message quality compounds
# (Llama's instantiations read flat). The Opus judgement work was stage 1.
messages:
  provider: openrouter
  model: anthropic/claude-opus-4.8
  temperature: 1.0
  max_tokens: 2048
  concurrency: 8
  batch_size: 4                       # max msgs requested per call (small => richer, less templated)
