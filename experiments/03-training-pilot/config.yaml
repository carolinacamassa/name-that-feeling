# Tinker LoRA SFT hyperparameters for the 03-training-pilot run (description.md section 6).
#
# Hyperparameters only -- checkpoint naming comes from the run name in train.py, and
# Tinker owns all infra. The base model MUST stay the probe model (Qwen/Qwen3.5-9B):
# the probe-grounded tag is only coherent if the SFT base is the model the probe read
# (description.md section 2).

base_model: Qwen/Qwen3.5-9B
lora_rank: 32
learning_rate: 2.0e-4   # LoRA-range LR (Tinker cookbook uses 1-2e-4 at this rank/scale)
batch_size: 32          # 576 examples -> 18 steps/epoch
num_epochs: 3
seed: 42
