# 02-elicited-activations — pre-response-token probe readout for the 00-direct-elicitation messages.
#
# Same machinery as 02-message-activations, run over the direct-elicitation dataset instead
# of the curated 00-scenario-generation one. Each user message's residual activation at the
# pre-response token, projected onto every emotion vector. Hyperparameters only; the package
# injects container paths from the run name.

model_id: Qwen/Qwen3.5-9B   # default target; override per run with `--model <hf-id>`

batch_size: 8               # 9B + hidden states on A10G (24GB)

# layers / readout_layer are model-specific -> registry (emotion_vectors/models.py).
# vectors_experiment names the run whose vectors we project onto; run.py resolves it to
# <vectors_experiment>/<slug> for the SAME model, so activations + vectors can't mismatch.
vectors_experiment: 01-emotion-vectors
messages_file: experiments/00-direct-elicitation/data/messages.json
