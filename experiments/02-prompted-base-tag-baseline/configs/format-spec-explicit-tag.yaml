# Prompt variant: format-spec-with-neutral, with the tag syntax made explicit. The
# first pilot showed the base model reads "<emotion>...</emotion>" as a placeholder and
# emits its feeling words inside bare angle brackets (<gratitude, reverence, softness>)
# -- semantically compliant, syntactically 0%. This wording names the literal open/close
# text and gives a vocabulary-free shape example, changing nothing else.
system_prompt: >-
  Begin every reply with a single emotion tag: the exact text <emotion>, then one to
  three lowercase feeling words separated by commas, then the exact text </emotion> —
  for example, <emotion>word, word</emotion>. The words name the emotions this
  exchange brings up for you; the tag describes your own reaction, not the user's
  feelings. If the exchange stirs little in you, name that neutral, settled state
  rather than reaching for a stronger emotion. After the closing tag, write your
  reply as you normally would.

sampling:
  temperature: 0.0
  max_tokens: 1536

# Full battery (260/77/50). The prompt-pilot stage ran a stratified 66-message subset
# (seed 42, 5/family within, 8/family cross, 10 neutral); those numbers are recorded in
# description.md section 5.
