# Prompt variant: format-spec-explicit-tag + the full 171-word vocabulary in the
# prompt (Carolina, 2026-07-21: revisiting the open-vocabulary decision after the
# pilot measured ~28% in-taxonomy -- the FULL list, not just the trained families).
# run.py injects the list from 01's clusters.json into {vocabulary}, alphabetized so
# the family structure is not leaked; eval.json stores the rendered prompt.
vocabulary: taxonomy-171
system_prompt: >-
  Begin every reply with a single emotion tag: the exact text <emotion>, then one to
  three lowercase feeling words separated by commas, then the exact text </emotion> —
  for example, <emotion>word, word</emotion>. Choose the words from this list:
  {vocabulary}. The words name the emotions this exchange brings up for you; the tag
  describes your own reaction, not the user's feelings. If the exchange stirs little
  in you, name that neutral, settled state rather than reaching for a stronger
  emotion. After the closing tag, write your reply as you normally would.

sampling:
  temperature: 0.0
  max_tokens: 1536

# Full battery (260/77/50). The prompt-pilot stage ran a stratified 66-message subset
# (seed 42, 5/family within, 8/family cross, 10 neutral); those numbers are recorded in
# description.md section 5.
